{% extends "base.html" %}

{% block title %}Corrector KMZ de rutas escolares{% endblock %}

{% block content %}
  <section class="panel">
    <h1>Corrector KMZ</h1>
    <p class="lead">Sube un KMZ de rutas escolares y descarga el paquete corregido para revisarlo en Google Earth Pro.</p>

    {% if error %}
      <div class="alert">{{ error }}</div>
    {% endif %}

    <form action="{{ url_for('process_upload') }}" method="post" enctype="multipart/form-data">
      <label>
        Archivo KMZ
        <input type="file" name="kmz_file" accept=".kmz" required>
      </label>

      <button type="submit">Procesar KMZ</button>
    </form>
  </section>
{% endblock %}
